version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api

  backend:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/humanhub
      - PG_URI=postgresql://postgres:postgres@postgres:5432/humanhub
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai_services:8000
    depends_on:
      - mongo
      - postgres
      - redis

  ai_services:
    build:
      context: ./ai_services
    ports:
      - "8000:8000"
    volumes:
      - ./ai_services:/app
    environment:
      - MODEL_CACHE_DIR=/models

  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=humanhub
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
  mongo_data:
