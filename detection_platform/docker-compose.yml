version: '3.8'

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.orchestrator.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./services/orchestrator:/app
      - ./shared:/app/shared
    depends_on:
      - metadata-analyzer
      - image-detector
      - trust-score-engine

  metadata-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.metadata_analyzer.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ./services/metadata_analyzer:/app
      - ./shared:/app/shared

  image-detector:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.image_detector.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - ./services/image_detector:/app
      - ./shared:/app/shared

  trust-score-engine:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.trust_score_engine.main:app --host 0.0.0.0 --port 8009
    ports:
      - "8009:8009"
    volumes:
      - ./services/trust_score_engine:/app
      - ./shared:/app/shared

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.gateway.main:app --host 0.0.0.0 --port 8011
    ports:
      - "8011:8011"
    volumes:
      - ./services/gateway:/app

  upload-service:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.upload.main:app --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    volumes:
      - ./services/upload:/app
      - /tmp/humanhub_uploads:/tmp/humanhub_uploads

  text-detector:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.text_detector.main:app --host 0.0.0.0 --port 8006
    ports:
      - "8006:8006"
    volumes:
      - ./services/text_detector:/app

  behavior-engine:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn services.behavior_engine.main:app --host 0.0.0.0 --port 8007
    ports:
      - "8007:8007"
    volumes:
      - ./services/behavior_engine:/app

networks:
  default:
    name: humanhub-network
